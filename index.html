<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Interactive Rating</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card" id="rating-card">

    <div class="star">
      ⭐
    </div>

    <h2>How did we do?</h2>

    <p>
      Please let us know how we did with your support request.
      All feedback is appreciated to help us improve our offering!
    </p>

    <div class="ratings">
      <button class="rating-btn">1</button>
      <button class="rating-btn">2</button>
      <button class="rating-btn">3</button>
      <button class="rating-btn">4</button>
      <button class="rating-btn">5</button>
    </div>

    <button id="submit-btn">SUBMIT</button>

  </div>

  <!-- THANK YOU CARD -->

  <div class="card hidden" id="thank-you-card">

    <div class="thank-you-img">
      ❤️
    </div>

    <p class="selected-rating">
      You selected <span id="selected-value">0</span> out of 5
    </p>

    <h2>Thank you!</h2>

    <p>
      We appreciate you taking the time to give a rating.
      If you ever need more support, don’t hesitate to get in touch!
    </p>

  </div>

  <script src="script.js"></script>

</body>
</html>
